<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet — votre liste, en silence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg: #10131A;
    --surface: #161A23;
    --surface-2: #1B202B;
    --line: #232836;
    --line-soft: #1C212B;
    --text: #E4E7EC;
    --text-dim: #6B7280;
    --text-faint: #454B58;
    --accent: #8FA98F;
    --accent-soft: rgba(143, 169, 143, 0.45);
    --accent-faint: rgba(143, 169, 143, 0.18);
    --haute: #C98A7A;
    --haute-faint: rgba(201, 138, 122, 0.16);
    --moyenne: #D8B978;
    --moyenne-faint: rgba(216, 185, 120, 0.14);
    --basse: #7C9FB8;
    --basse-faint: rgba(124, 159, 184, 0.14);
    --danger: #C98A7A;
    --radius: 10px;
    --ease: cubic-bezier(.4, 0, .2, 1);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  body{
    background-image:
      radial-gradient(circle at 20% 0%, rgba(143,169,143,0.05), transparent 45%),
      radial-gradient(circle at 80% 100%, rgba(143,169,143,0.04), transparent 50%);
    background-attachment: fixed;
  }

  ::selection{ background: var(--accent-faint); color: var(--text); }

  .stage{
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 120px;
  }

  /* ---------- Header / breathing ring ---------- */

  .topbar{
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
  }
  .user-email{ font-size: 12px; color: var(--text-faint); }
  .signout-btn{
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 11.5px;
    letter-spacing: 0.03em;
    padding: 5px 13px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 300ms var(--ease);
  }
  .signout-btn:hover{ border-color: var(--text-dim); color: var(--text); }

  .sync-dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 400ms var(--ease);
  }
  .sync-dot.syncing{ background: var(--accent); animation: pulse-dot 900ms ease-in-out infinite; }
  @keyframes pulse-dot{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.3; } }

  .header{
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-bottom: 56px;
  }

  .ring-wrap{
    position: relative;
    width: 116px;
    height: 116px;
    margin-bottom: 26px;
  }

  .ring-bg, .ring-fg{ fill: none; stroke-width: 1.4; }
  .ring-bg{ stroke: var(--line); }
  .ring-fg{
    stroke: var(--accent);
    stroke-linecap: round;
    transform: rotate(-90deg);
    transform-origin: 58px 58px;
    transition: stroke-dashoffset 1.1s var(--ease);
  }

  .ring-core{
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    animation: breathe 5200ms ease-in-out infinite;
  }

  @keyframes breathe{
    0%, 100% { transform: scale(1); opacity: 0.85; }
    50% { transform: scale(1.06); opacity: 1; }
  }

  .ring-count{ font-family: 'Fraunces', serif; font-size: 27px; font-weight: 400; line-height: 1; }
  .ring-total{ font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 4px; }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 29px;
    margin: 0 0 6px;
    letter-spacing: 0.01em;
  }

  .subline{ color: var(--text-dim); font-size: 14px; font-weight: 300; letter-spacing: 0.02em; }
  .subline span{ color: var(--accent); }

  /* ---------- Composer ---------- */

  .composer{
    background: linear-gradient(180deg, var(--surface) 0%, rgba(22,26,35,0.4) 100%);
    border: 1px solid var(--line-soft);
    border-radius: 18px;
    padding: 22px 22px 18px;
    margin-bottom: 48px;
    transition: border-color 400ms var(--ease);
  }
  .composer:focus-within{ border-color: rgba(143,169,143,0.25); }

  .composer-row{
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    margin-bottom: 16px;
  }

  #task-input{
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 300;
    padding: 4px;
  }
  #task-input::placeholder{ color: var(--text-faint); }

  /* ---------- Chip row : priority / category / when ---------- */

  .chip-row{
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .chip{
    appearance: none;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.02em;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 250ms var(--ease);
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .chip:hover{ border-color: var(--text-dim); color: var(--text); }
  .chip .dot{ width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .chip.set{ color: var(--text); border-color: var(--accent-soft); background: var(--accent-faint); }

  .divider-v{ width: 1px; height: 18px; background: var(--line); margin: 0 2px; }

  .composer-footer{
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .add-btn{
    appearance: none;
    background: var(--accent-faint);
    border: 1px solid var(--accent-soft);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    letter-spacing: 0.04em;
    padding: 9px 22px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 250ms var(--ease);
  }
  .add-btn:hover{ background: rgba(143,169,143,0.28); }
  .add-btn:disabled{ opacity: 0.4; cursor: default; }

  /* ---------- Popovers (priority / category / when) ---------- */

  .chip-wrap{ position: relative; }

  .popover{
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    z-index: 30;
    background: #1A1F29;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    animation: pop-in 220ms var(--ease) both;
    min-width: 240px;
  }
  @keyframes pop-in{
    from{ opacity: 0; transform: translateY(-6px) scale(0.97); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }

  /* priority popover */
  .priority-options{ display: flex; flex-direction: column; gap: 6px; }
  .priority-opt{
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 9px 11px;
    cursor: pointer;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    transition: all 200ms var(--ease);
    text-align: left;
  }
  .priority-opt:hover{ background: rgba(255,255,255,0.03); color: var(--text); }
  .priority-opt .pdot{ width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .priority-opt[data-priority="haute"] .pdot{ background: var(--haute); box-shadow: 0 0 10px rgba(201,138,122,0.5); }
  .priority-opt[data-priority="moyenne"] .pdot{ background: var(--moyenne); box-shadow: 0 0 10px rgba(216,185,120,0.4); }
  .priority-opt[data-priority="basse"] .pdot{ background: var(--basse); box-shadow: 0 0 10px rgba(124,159,184,0.4); }
  .priority-opt.active{ color: var(--text); }
  .priority-opt[data-priority="haute"].active{ background: var(--haute-faint); border-color: rgba(201,138,122,0.3); }
  .priority-opt[data-priority="moyenne"].active{ background: var(--moyenne-faint); border-color: rgba(216,185,120,0.3); }
  .priority-opt[data-priority="basse"].active{ background: var(--basse-faint); border-color: rgba(124,159,184,0.3); }

  /* category popover */
  .cat-list{ display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; max-height: 220px; overflow-y: auto; }
  .cat-opt{
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    transition: all 200ms var(--ease);
    text-align: left;
  }
  .cat-opt:hover{ background: rgba(255,255,255,0.03); color: var(--text); }
  .cat-opt.active{ color: var(--text); background: rgba(255,255,255,0.04); border-color: var(--line); }
  .cat-opt .dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .cat-new-row{
    display: flex;
    gap: 8px;
    border-top: 1px solid var(--line);
    padding-top: 12px;
  }
  .cat-new-row input{
    flex: 1;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    padding: 7px 10px;
    outline: none;
    min-width: 0;
  }
  .cat-new-row input:focus{ border-color: var(--accent-soft); }

  .swatches{ display: flex; gap: 6px; flex-wrap: wrap; margin-top: 9px; }
  .swatch{
    width: 19px; height: 19px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 180ms var(--ease);
    flex-shrink: 0;
  }
  .swatch.active{ border-color: var(--text); transform: scale(1.12); }

  .cat-add-btn{
    background: var(--accent-faint);
    border: 1px solid var(--accent-soft);
    color: var(--accent);
    border-radius: 8px;
    font-size: 16px;
    width: 32px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 200ms var(--ease);
  }
  .cat-add-btn:hover{ background: rgba(143,169,143,0.28); }

  /* when popover : calendar */
  .when-popover{ min-width: 290px; }

  .when-quick{ display: flex; flex-direction: column; gap: 3px; margin-bottom: 14px; }
  .when-quick-btn{
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: transparent;
    border: none;
    border-radius: 9px;
    padding: 9px 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    transition: all 200ms var(--ease);
  }
  .when-quick-btn:hover{ background: rgba(255,255,255,0.03); color: var(--text); }
  .when-quick-btn.active{ background: var(--accent-faint); color: var(--accent); }
  .when-quick-btn .wq-date{ font-size: 11px; color: var(--text-faint); }

  .cal-divider{ height: 1px; background: var(--line); margin: 10px 0 12px; }

  .cal-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .cal-head-label{
    font-family: 'Fraunces', serif;
    font-size: 14.5px;
    color: var(--text);
    text-transform: capitalize;
  }
  .cal-nav{
    display: flex; gap: 4px;
  }
  .cal-nav-btn{
    background: none; border: none; color: var(--text-faint);
    cursor: pointer; font-size: 14px; width: 24px; height: 24px;
    border-radius: 6px; transition: all 200ms var(--ease);
    display: flex; align-items: center; justify-content: center;
  }
  .cal-nav-btn:hover{ background: rgba(255,255,255,0.05); color: var(--text); }

  .cal-grid{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 14px;
  }
  .cal-dow{
    font-size: 10px;
    color: var(--text-faint);
    text-align: center;
    padding-bottom: 4px;
    text-transform: lowercase;
  }
  .cal-day{
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12.5px;
    cursor: pointer;
    transition: all 180ms var(--ease);
  }
  .cal-day:hover{ background: rgba(255,255,255,0.06); color: var(--text); }
  .cal-day.muted{ color: var(--text-faint); opacity: 0.35; }
  .cal-day.today{ color: var(--accent); font-weight: 600; }
  .cal-day.selected{ background: var(--accent); color: #10131A; font-weight: 600; }
  .cal-day.past{ opacity: 0.25; pointer-events: none; }

  .time-section{ border-top: 1px solid var(--line); padding-top: 12px; }
  .time-section-label{
    font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 9px;
  }
  .time-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    margin-bottom: 10px;
  }
  .time-opt{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 7px 4px;
    font-size: 12px;
    cursor: pointer;
    transition: all 180ms var(--ease);
    font-family: 'Inter', sans-serif;
  }
  .time-opt:hover{ border-color: var(--text-dim); color: var(--text); }
  .time-opt.active{ background: var(--accent-faint); border-color: var(--accent-soft); color: var(--accent); }

  .time-custom{
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .time-custom input[type="number"]{
    width: 48px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 6px;
    text-align: center;
    outline: none;
    -moz-appearance: textfield;
  }
  .time-custom input[type="number"]::-webkit-outer-spin-button,
  .time-custom input[type="number"]::-webkit-inner-spin-button{ -webkit-appearance: none; margin: 0; }
  .time-custom input:focus{ border-color: var(--accent-soft); }
  .time-custom span{ color: var(--text-faint); font-size: 13px; }

  .duration-row{ margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  .duration-chips{ display: flex; flex-wrap: wrap; gap: 6px; }
  .dur-opt{
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 14px;
    padding: 5px 11px;
    font-size: 11.5px;
    cursor: pointer;
    transition: all 180ms var(--ease);
  }
  .dur-opt:hover{ border-color: var(--text-dim); color: var(--text); }
  .dur-opt.active{ background: var(--accent-faint); border-color: var(--accent-soft); color: var(--accent); }

  .when-actions{
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
  }
  .when-actions button{
    background: none;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .when-clear-action{ color: var(--text-faint); }
  .when-clear-action:hover{ color: var(--danger); }
  .when-done-action{ color: var(--accent); font-weight: 500; }
  .when-done-action:hover{ opacity: 0.8; }

  /* ---------- Filters ---------- */

  .filters{
    display: flex;
    gap: 22px;
    margin-bottom: 30px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
  }
  .filter-btn{
    background: none; border: none; color: var(--text-faint);
    font-family: 'Inter', sans-serif; font-size: 13px; letter-spacing: 0.02em;
    cursor: pointer; padding: 2px 0; position: relative;
    transition: color 300ms var(--ease);
  }
  .filter-btn:hover{ color: var(--text-dim); }
  .filter-btn.active{ color: var(--text); }
  .filter-btn.active::after{
    content: ''; position: absolute; left: 0; right: 0; bottom: -15px;
    height: 1px; background: var(--accent);
  }

  /* ---------- List ---------- */

  .group-divider{
    font-size: 10.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 30px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .group-divider::after{ content: ''; flex: 1; height: 1px; background: var(--line); }
  .group-divider:first-child{ margin-top: 0; }

  ul.task-list{ list-style: none; margin: 0; padding: 0; }

  li.task{
    display: flex;
    align-items: flex-start;
    gap: 13px;
    padding: 13px 14px;
    margin-bottom: 6px;
    border-radius: 12px;
    border-left: 3px solid transparent;
    background: rgba(255,255,255,0.012);
    cursor: default;
    transition: background 250ms var(--ease), border-color 250ms var(--ease);
    animation: rise 460ms var(--ease) both;
  }
  li.task:hover{ background: rgba(255,255,255,0.028); }

  li.task[data-priority="haute"]{ border-left-color: var(--haute); }
  li.task[data-priority="moyenne"]{ border-left-color: var(--moyenne); }
  li.task[data-priority="basse"]{ border-left-color: var(--basse); }
  li.task.done{ border-left-color: var(--line); }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(8px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .check{
    flex-shrink: 0;
    width: 19px; height: 19px;
    border-radius: 50%;
    border: 1.4px solid var(--text-dim);
    margin-top: 2px;
    cursor: pointer;
    position: relative;
    transition: border-color 300ms var(--ease);
  }
  .check:hover{ border-color: var(--accent); }
  .check::after{
    content: '';
    position: absolute; inset: 3px;
    border-radius: 50%;
    background: var(--accent);
    transform: scale(0);
    transition: transform 360ms var(--ease);
  }
  li.task.done .check{ border-color: var(--accent); }
  li.task.done .check::after{ transform: scale(1); }

  .task-body{ flex: 1; min-width: 0; }
  .task-text{
    font-size: 15px;
    font-weight: 300;
    line-height: 1.5;
    transition: color 600ms var(--ease), opacity 600ms var(--ease);
  }
  li.task.done .task-text{ color: var(--text-faint); opacity: 0.55; }

  .task-tags{
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 7px;
  }

  .tag-priority{
    font-size: 10.5px;
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px 2px 7px;
    border-radius: 10px;
  }
  .tag-priority .pdot{ width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .tag-priority.haute{ color: var(--haute); background: var(--haute-faint); }
  .tag-priority.moyenne{ color: var(--moyenne); background: var(--moyenne-faint); }
  .tag-priority.basse{ color: var(--basse); background: var(--basse-faint); }

  .tag-cat{
    font-size: 11px;
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .tag-cat .dot{ width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .task-when{
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.01em;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .task-when.overdue{ color: var(--haute); }
  .task-when.soon{ color: var(--accent); }
  .task-when::before{
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: currentColor; opacity: 0.8;
  }

  .remove-btn{
    flex-shrink: 0;
    background: none; border: none;
    color: var(--text-faint);
    font-size: 16px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 250ms var(--ease), color 250ms var(--ease);
    line-height: 1;
    padding: 2px 4px;
  }
  li.task:hover .remove-btn{ opacity: 1; }
  .remove-btn:hover{ color: var(--danger); }

  li.task.leaving{ animation: leave 480ms var(--ease) forwards; }
  @keyframes leave{
    to{ opacity: 0; transform: translateX(10px); max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; }
  }

  .empty{
    text-align: center;
    padding: 60px 0;
    color: var(--text-faint);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 300;
    font-style: italic;
    animation: fade-in 800ms var(--ease) both;
  }
  @keyframes fade-in{ from{ opacity: 0; } to{ opacity: 1; } }

  .footer{
    text-align: center;
    margin-top: 70px;

    align-items: center;
    text-align: center;

    position: relative;
    animation: breathe 5200ms ease-in-out infinite;

  .auth-sub{ color: var(--text-dim); font-size: 13.5px; font-weight: 300; margin-bottom: 40px; }
  .auth-form{ width: 100%; display: flex; flex-direction: column; gap: 18px; }
  .field{ display: flex; flex-direction: column; gap: 6px; text-align: left; }
  .field label{ font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-faint); }
  .field input{
    background: transparent; border: none; border-bottom: 1px solid var(--line);
    outline: none; color: var(--text); font-family: 'Inter', sans-serif;
    font-size: 15px; font-weight: 300; padding: 9px 2px;
    transition: border-color 300ms var(--ease);
  }
  .field input:focus{ border-color: var(--accent-soft); }
  .field input::placeholder{ color: var(--text-faint); }
  .auth-submit{
    margin-top: 8px; appearance: none; background: var(--accent-faint);
    border: 1px solid var(--accent-soft); color: var(--accent);
    font-family: 'Inter', sans-serif; font-size: 13.5px; letter-spacing: 0.03em;
    padding: 12px 20px; border-radius: 24px; cursor: pointer;
    transition: all 300ms var(--ease);
  }
  .auth-submit:hover{ background: rgba(143,169,143,0.26); }
  .auth-submit:disabled{ opacity: 0.5; cursor: default; }
  .auth-switch{ margin-top: 24px; font-size: 13px; color: var(--text-faint); }
  .auth-switch button{
    background: none; border: none; color: var(--text-dim);
    text-decoration: underline; text-underline-offset: 3px; cursor: pointer;
    font-size: 13px; font-family: 'Inter', sans-serif;

  .auth-switch button:hover{ color: var(--accent); }
  .auth-msg{ min-height: 18px; font-size: 12.5px; margin-top: 4px; }
  .auth-msg.error{ color: var(--danger); }
  .auth-msg.ok{ color: var(--accent); }

  .hidden{ display: none !important; }

  @media (max-width: 480px){
    .stage{ padding: 40px 16px 100px; }

    @keyframes pop-in{
      from{ opacity: 0; transform: translateX(-50%) translateY(-6px) scale(0.97); }
      to{ opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;

(function(){

  let tasks = [];
  let categories = []; // [{id, name, color}]

  let currentUser = null;

  // pending "when" state (composer, not yet committed)
  let pendingDate = null;     // Date object (day only) or null
  let pendingHour = null;     // number or null
  let pendingMinute = null;   // number or null
  let pendingDuration = null; // minutes or null
  let calViewMonth = new Date(); // month currently shown in calendar

  // ---------- DOM refs : auth ----------
  const authStage = document.getElementById('auth-stage');

  const authEmail = document.getElementById('auth-email');
  const authPassword = document.getElementById('auth-password');
  const authSubmit = document.getElementById('auth-submit');

  // ---------- DOM refs : app ----------

  const ringCount = document.getElementById('ring-count');
  const ringTotal = document.getElementById('ring-total');
  const subline = document.getElementById('subline');
  const footerNote = document.getElementById('footer-note');

  // priority chip
  const priorityWrap = document.getElementById('priority-wrap');
  const priorityChip = document.getElementById('priority-chip');
  const priorityChipDot = document.getElementById('priority-chip-dot');
  const priorityChipLabel = document.getElementById('priority-chip-label');
  const priorityPopover = document.getElementById('priority-popover');

  // category chip
  const categoryWrap = document.getElementById('category-wrap');
  const categoryChip = document.getElementById('category-chip');
  const categoryChipDot = document.getElementById('category-chip-dot');
  const categoryChipLabel = document.getElementById('category-chip-label');
  const categoryPopover = document.getElementById('category-popover');
  const catList = document.getElementById('cat-list');
  const catNewName = document.getElementById('cat-new-name');
  const catAddBtn = document.getElementById('cat-add-btn');
  const catSwatches = document.getElementById('cat-swatches');
  let newCatColor = DEFAULT_CATEGORY_COLORS[0];

  // when chip
  const whenWrap = document.getElementById('when-wrap');
  const whenChip = document.getElementById('when-chip');
  const whenChipLabel = document.getElementById('when-chip-label');
  const whenPopover = document.getElementById('when-popover');
  const whenQuick = document.getElementById('when-quick');
  const calPrev = document.getElementById('cal-prev');
  const calNext = document.getElementById('cal-next');
  const calHeadLabel = document.getElementById('cal-head-label');
  const calGrid = document.getElementById('cal-grid');
  const timeGrid = document.getElementById('time-grid');
  const timeH = document.getElementById('time-h');
  const timeM = document.getElementById('time-m');
  const durationChips = document.getElementById('duration-chips');
  const whenClearAction = document.getElementById('when-clear-action');
  const whenDoneAction = document.getElementById('when-done-action');

  const CIRCUMFERENCE = 2 * Math.PI * 50;
  const DOW = ['lu','ma','me','je','ve','sa','di'];
  const QUICK_HOURS = ['08:00','09:00','12:00','14:00','18:00','20:00'];
  const DURATIONS = [15, 30, 45, 60, 90, 120, 180, 240];

  // =========================================================
  // Auth
  // =========================================================
  function setAuthMode(mode){
    authMode = mode;
    authMsg.textContent = '';
    authMsg.className = 'auth-msg';
    if(mode === 'signin'){
      authSubmit.textContent = 'se connecter';
      authSub.textContent = 'Connectez-vous pour retrouver votre liste, partout.';
      authSwitchText.textContent = 'Pas encore de compte ?';
      authSwitchBtn.textContent = 'créer un compte';
      authPassword.setAttribute('autocomplete', 'current-password');
    } else {
      authSubmit.textContent = 'créer mon compte';
      authSub.textContent = 'Un compte, pour garder votre calme avec vous.';
      authSwitchText.textContent = 'Déjà un compte ?';
      authSwitchBtn.textContent = 'se connecter';
      authPassword.setAttribute('autocomplete', 'new-password');
    }
  }

  authSwitchBtn.addEventListener('click', () => setAuthMode(authMode === 'signin' ? 'signup' : 'signin'));

  authForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = authEmail.value.trim();
    const password = authPassword.value;
    authSubmit.disabled = true;
    authMsg.className = 'auth-msg';
    authMsg.textContent = '';
    try{
      if(authMode === 'signin'){
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if(error) throw error;
      } else {
        const { error } = await supabase.auth.signUp({ email, password });
        if(error) throw error;
        authMsg.className = 'auth-msg ok';
        authMsg.textContent = 'Compte créé. Vérifiez vos emails si une confirmation est requise, puis connectez-vous.';
        setAuthMode('signin');
      }
    } catch(err){
      authMsg.className = 'auth-msg error';
      authMsg.textContent = translateAuthError(err.message);
    } finally {
      authSubmit.disabled = false;
    }
  });

  function translateAuthError(msg){
    if(/already registered/i.test(msg)) return 'Un compte existe déjà avec cet email.';
    if(/invalid login credentials/i.test(msg)) return 'Email ou mot de passe incorrect.';
    if(/password should be/i.test(msg)) return 'Le mot de passe doit faire au moins 6 caractères.';
    if(/email not confirmed/i.test(msg)) return 'Veuillez confirmer votre email avant de vous connecter.';
    return 'Une erreur est survenue. Réessayez.';
  }

  signoutBtn.addEventListener('click', async () => { await supabase.auth.signOut(); });

  supabase.auth.onAuthStateChange((event, session) => {
    if(session && session.user){
      currentUser = session.user;
      showApp();
    } else {
      currentUser = null;
      showAuth();
    }
  });

  function showApp(){
    authStage.classList.add('hidden');
    appStage.classList.remove('hidden');
    userEmailEl.textContent = currentUser.email;
    Promise.all([fetchCategories(), fetchTasks()]);
  }
  function showAuth(){
    appStage.classList.add('hidden');
    authStage.classList.remove('hidden');
    authForm.reset();
  }

  function setSyncing(on){ syncDot.classList.toggle('syncing', on); }

  // =========================================================
  // Data layer
  // =========================================================
  async function fetchCategories(){
    const { data, error } = await supabase.from('categories').select('*').order('created_at', { ascending: true });
    if(error){ console.error(error); return; }
    categories = data || [];
    renderCategoryList();
  }

  async function createCategory(name, color){
    if(!name.trim() || !currentUser) return null;
    const { data, error } = await supabase
      .from('categories')
      .insert({ user_id: currentUser.id, name: name.trim(), color })
      .select()
      .single();
    if(error){
      if(/duplicate/i.test(error.message)){
        const existing = categories.find(c => c.name.toLowerCase() === name.trim().toLowerCase());
        return existing || null;
      }
      console.error(error);
      return null;
    }
    categories.push(data);
    renderCategoryList();
    return data;
  }

  async function fetchTasks(){
    setSyncing(true);
    const { data, error } = await supabase.from('tasks').select('*').order('created_at', { ascending: false });
    setSyncing(false);
    if(error){ console.error(error); footerNote.textContent = 'Synchronisation impossible.'; return; }
    tasks = data || [];
    render();
  }

  async function addTask(text){
    const trimmed = text.trim();
    if(!trimmed || !currentUser) return;
    addBtn.disabled = true;

    let catName = 'Général', catColor = '#8FA98F';
    if(selectedCategory){ catName = selectedCategory.name; catColor = selectedCategory.color; }

    const dueAt = buildDueAtIso();
    const hasTime = pendingHour !== null;

    setSyncing(true);
    const { data, error } = await supabase
      .from('tasks')
      .insert({
        user_id: currentUser.id,
        text: trimmed,
        done: false,
        priority: selectedPriority,
        category: catName,
        category_color: catColor,
        due_at: dueAt,
        has_time: hasTime,
        duration_minutes: pendingDuration
      })
      .select()
      .single();
    setSyncing(false);
    addBtn.disabled = false;
    if(error){ console.error(error); return; }
    tasks.unshift(data);
    resetComposerWhen();
    taskInput.value = '';
    taskInput.focus();
    render();
  }

  async function toggleTask(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    t.done = !t.done;
    render();
    setSyncing(true);
    const { error } = await supabase.from('tasks').update({ done: t.done }).eq('id', id);
    setSyncing(false);
    if(error){ console.error(error); t.done = !t.done; render(); }
  }

  async function removeTask(id){
    const el = document.querySelector(`[data-id="${id}"]`);
    const finish = async () => {
      tasks = tasks.filter(t => t.id !== id);
      render();
      setSyncing(true);
      const { error } = await supabase.from('tasks').delete().eq('id', id);
      setSyncing(false);
      if(error) console.error(error);
    };
    if(el){ el.classList.add('leaving'); setTimeout(finish, 460); } else { finish(); }
  }

  // =========================================================
  // Priority popover
  // =========================================================
  function closeAllPopovers(except){
    [priorityPopover, categoryPopover, whenPopover].forEach(p => {
      if(p !== except) p.classList.add('hidden');
    });
  }

  priorityChip.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = priorityPopover.classList.contains('hidden');
    closeAllPopovers();
    priorityPopover.classList.toggle('hidden', !willOpen);
  });

  priorityPopover.addEventListener('click', (e) => {
    const opt = e.target.closest('.priority-opt');
    if(!opt) return;
    selectedPriority = opt.getAttribute('data-priority');
    priorityPopover.querySelectorAll('.priority-opt').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    updatePriorityChip();
    priorityPopover.classList.add('hidden');
  });

  function updatePriorityChip(){
    const map = { haute: ['var(--haute)', 'Haute'], moyenne: ['var(--moyenne)', 'Moyenne'], basse: ['var(--basse)', 'Basse'] };
    const [color, label] = map[selectedPriority];
    priorityChipDot.style.background = color;
    priorityChipLabel.textContent = label;
    priorityChip.style.color = color;
    priorityChip.style.borderColor = color;
    priorityChip.style.background = 'transparent';
  }

  // =========================================================
  // Category popover
  // =========================================================
  function renderCategoryList(){
    catList.innerHTML = '';
    const generalBtn = makeCatOption({ id: null, name: 'Général', color: '#8FA98F' });
    catList.appendChild(generalBtn);
    categories.forEach(c => catList.appendChild(makeCatOption(c)));
  }

  function makeCatOption(cat){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cat-opt' + ((selectedCategory ? selectedCategory.id : null) === cat.id ? ' active' : '');
    btn.innerHTML = `<span class="dot" style="background:${cat.color}"></span> ${escapeHtml(cat.name)}`;
    btn.addEventListener('click', () => {
      selectedCategory = cat.id ? cat : null;
      updateCategoryChip();
      renderCategoryList();
      categoryPopover.classList.add('hidden');
    });
    return btn;
  }

  function updateCategoryChip(){
    const cat = selectedCategory || { name: 'Général', color: '#8FA98F' };
    categoryChipDot.style.background = cat.color;
    categoryChipLabel.textContent = cat.name;
  }

  DEFAULT_CATEGORY_COLORS.forEach((color, idx) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (idx === 0 ? ' active' : '');

      newCatColor = color;
      catSwatches.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');

    catSwatches.appendChild(sw);

  categoryChip.addEventListener('click', (e) => {

    const willOpen = categoryPopover.classList.contains('hidden');
    closeAllPopovers();
    categoryPopover.classList.toggle('hidden', !willOpen);
  });

    const name = catNewName.value.trim();

    const created = await createCategory(name, newCatColor);

      selectedCategory = created;
      updateCategoryChip();
      catNewName.value = '';
      categoryPopover.classList.add('hidden');
    }

  catAddBtn.addEventListener('click', submitNewCategory);
  catNewName.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); submitNewCategory(); } });

  // =========================================================
  // When popover : quick options + calendar + time
  // =========================================================
  function buildQuickOptions(){
    whenQuick.innerHTML = '';
    const today = startOfDay(new Date());
    const tomorrow = addDays(today, 1);
    const afterTomorrow = addDays(today, 2);
    const opts = [
      { label: "aujourd'hui", date: today },
      { label: 'demain', date: tomorrow },
      { label: 'après-demain', date: afterTomorrow },
    ];
    opts.forEach(o => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'when-quick-btn';
      btn.innerHTML = `<span>${o.label}</span><span class="wq-date">${o.date.toLocaleDateString('fr-FR', {day:'numeric', month:'short'})}</span>`;
      btn.addEventListener('click', () => {
        pendingDate = o.date;
        calViewMonth = new Date(o.date);
        renderCalendar();
        refreshQuickActiveState();
      });
      whenQuick.appendChild(btn);
    });
  }

  function refreshQuickActiveState(){
    const btns = whenQuick.querySelectorAll('.when-quick-btn');
    const today = startOfDay(new Date());
    btns.forEach((btn, i) => {
      const target = addDays(today, i);
      btn.classList.toggle('active', pendingDate && isSameDay(pendingDate, target));
    });
  }

  function startOfDay(d){ const nd = new Date(d); nd.setHours(0,0,0,0); return nd; }
  function addDays(d, n){ const nd = new Date(d); nd.setDate(nd.getDate()+n); return nd; }
  function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

  function renderCalendar(){
    calHeadLabel.textContent = calViewMonth.toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' });
    calGrid.innerHTML = '';
    DOW.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      calGrid.appendChild(el);
    });

    const year = calViewMonth.getFullYear(), month = calViewMonth.getMonth();
    const firstOfMonth = new Date(year, month, 1);
    let startOffset = firstOfMonth.getDay() - 1; // lundi = 0
    if(startOffset < 0) startOffset = 6;
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const today = startOfDay(new Date());

    for(let i=0; i<startOffset; i++){
      const d = new Date(year, month, 1 - (startOffset - i));
      calGrid.appendChild(makeCalDay(d, true));
    }
    for(let day=1; day<=daysInMonth; day++){
      const d = new Date(year, month, day);
      calGrid.appendChild(makeCalDay(d, false));
    }
    const totalCells = startOffset + daysInMonth;
    const trailing = (7 - (totalCells % 7)) % 7;
    for(let i=1; i<=trailing; i++){
      calGrid.appendChild(makeCalDay(new Date(year, month+1, i), true));
    }
  }

  function makeCalDay(date, muted){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'cal-day';
    btn.textContent = date.getDate();
    const today = startOfDay(new Date());
    if(muted) btn.classList.add('muted');
    if(isSameDay(date, today)) btn.classList.add('today');
    if(pendingDate && isSameDay(date, pendingDate)) btn.classList.add('selected');
    if(startOfDay(date) < today) btn.classList.add('past');
    btn.addEventListener('click', () => {
      pendingDate = startOfDay(date);
      renderCalendar();
      refreshQuickActiveState();
    });
    return btn;
  }

  calPrev.addEventListener('click', () => {
    calViewMonth = new Date(calViewMonth.getFullYear(), calViewMonth.getMonth()-1, 1);
    renderCalendar();
  });
  calNext.addEventListener('click', () => {
    calViewMonth = new Date(calViewMonth.getFullYear(), calViewMonth.getMonth()+1, 1);
    renderCalendar();
  });

  function buildTimeGrid(){
    timeGrid.innerHTML = '';
    QUICK_HOURS.forEach(t => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'time-opt';
      btn.textContent = t;
      btn.addEventListener('click', () => {
        const [h,m] = t.split(':').map(Number);
        pendingHour = h; pendingMinute = m;
        timeH.value = h; timeM.value = String(m).padStart(2,'0');
        refreshTimeActiveState();
      });
      timeGrid.appendChild(btn);
    });
  }
  function refreshTimeActiveState(){
    timeGrid.querySelectorAll('.time-opt').forEach(btn => {
      const [h,m] = btn.textContent.split(':').map(Number);
      btn.classList.toggle('active', pendingHour === h && pendingMinute === m);
    });
  }
  timeH.addEventListener('input', () => {
    const v = timeH.value === '' ? null : Math.max(0, Math.min(23, parseInt(timeH.value,10)));
    pendingHour = v;
    if(v !== null && pendingMinute === null) pendingMinute = 0;
    refreshTimeActiveState();
  });
  timeM.addEventListener('input', () => {
    const v = timeM.value === '' ? null : Math.max(0, Math.min(59, parseInt(timeM.value,10)));
    pendingMinute = v;
    if(v !== null && pendingHour === null) pendingHour = 0;
    refreshTimeActiveState();
  });

  function buildDurationChips(){
    durationChips.innerHTML = '';
    DURATIONS.forEach(min => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'dur-opt';
      btn.textContent = formatDuration(min);
      btn.addEventListener('click', () => {
        pendingDuration = (pendingDuration === min) ? null : min;
        refreshDurationActiveState();
      });
      durationChips.appendChild(btn);
    });
  }
  function refreshDurationActiveState(){
    durationChips.querySelectorAll('.dur-opt').forEach((btn, i) => {
      btn.classList.toggle('active', pendingDuration === DURATIONS[i]);
    });
  }

  whenChip.addEventListener('click', (e) => {
    e.stopPropagation();
    const willOpen = whenPopover.classList.contains('hidden');
    closeAllPopovers();
    if(willOpen){
      calViewMonth = pendingDate ? new Date(pendingDate) : new Date();
      renderCalendar();
      refreshQuickActiveState();
      refreshTimeActiveState();
      refreshDurationActiveState();
    }
    whenPopover.classList.toggle('hidden', !willOpen);
  });

  whenClearAction.addEventListener('click', () => {
    resetComposerWhen();
    whenPopover.classList.add('hidden');
  });
  whenDoneAction.addEventListener('click', () => {
    updateWhenChip();
    whenPopover.classList.add('hidden');
  });

  function resetComposerWhen(){
    pendingDate = null; pendingHour = null; pendingMinute = null; pendingDuration = null;
    timeH.value = ''; timeM.value = '';
    updateWhenChip();
  }

  function updateWhenChip(){
    const dot = whenChip.querySelector('.dot');
    if(!pendingDate){
      whenChipLabel.textContent = 'échéance';
      dot.style.background = 'var(--text-faint)';
      whenChip.classList.remove('set');
      return;
    }
    let label = relativeDayLabel(pendingDate);
    if(pendingHour !== null){
      label += ' · ' + String(pendingHour).padStart(2,'0') + ':' + String(pendingMinute || 0).padStart(2,'0');
    }
    if(pendingDuration){
      label += ' · ' + formatDuration(pendingDuration);
    }
    whenChipLabel.textContent = label;
    dot.style.background = 'var(--accent)';
    whenChip.classList.add('set');
  }

  function buildDueAtIso(){
    if(!pendingDate) return null;
    const d = new Date(pendingDate);
    if(pendingHour !== null){
      d.setHours(pendingHour, pendingMinute || 0, 0, 0);
    } else {
      d.setHours(0,0,0,0);
    }
    return d.toISOString();
  }

  // close popovers on outside click
  document.addEventListener('click', (e) => {
    if(!priorityWrap.contains(e.target)) priorityPopover.classList.add('hidden');
    if(!categoryWrap.contains(e.target)) categoryPopover.classList.add('hidden');
    if(!whenWrap.contains(e.target)) whenPopover.classList.add('hidden');
  });

  // =========================================================
  // Date / duration formatting helpers
  // =========================================================
  function dayKeyOf(date){
    return date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');
  }

  function relativeDayLabel(date){
    const today = startOfDay(new Date());
    const diffDays = Math.round((startOfDay(date) - today) / 86400000);
    if(diffDays === 0) return "aujourd'hui";
    if(diffDays === 1) return 'demain';
    if(diffDays === 2) return 'après-demain';
    if(diffDays === -1) return 'hier';
    if(diffDays > 2 && diffDays < 7) return date.toLocaleDateString('fr-FR', { weekday: 'long' });
    return date.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
  }

  function formatDuration(min){
    if(!min) return '';
    if(min < 60) return min + ' min';
    const h = Math.floor(min/60), m = min % 60;
    return m === 0 ? h + ' h' : h + ' h ' + m;
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // =========================================================
  // Rendering : task list
  // =========================================================
  function priorityRank(p){ return p === 'haute' ? 0 : p === 'moyenne' ? 1 : 2; }

  function visibleTasks(){
    if(filter === 'active') return tasks.filter(t => !t.done);
    if(filter === 'done') return tasks.filter(t => t.done);
    return tasks;
  }

  function groupByTime(list){
    const dated = list.filter(t => t.due_at).sort((a,b) => new Date(a.due_at) - new Date(b.due_at));
    const undated = list.filter(t => !t.due_at).sort((a,b) => {
      if(a.done !== b.done) return a.done ? 1 : -1;
      return priorityRank(a.priority) - priorityRank(b.priority);
    });

    const groups = [];
    let currentKey = null;
    dated.forEach(t => {
      const d = new Date(t.due_at);
      const key = dayKeyOf(d);
      if(key !== currentKey){
        groups.push({ label: relativeDayLabel(d), tasks: [] });
        currentKey = key;
      }
      groups[groups.length - 1].tasks.push(t);
    });
    if(undated.length) groups.push({ label: 'sans échéance', tasks: undated });
    return groups;
  }

  function taskWhenHtml(t){
    if(!t.due_at) return '';
    const d = new Date(t.due_at);
    const now = new Date();
    let cls = '';
    if(!t.done && d < now) cls = 'overdue';
    else if(!t.done && (d - now) < 1000*60*60*3 && (d - now) > 0) cls = 'soon';

    let text = t.has_time
      ? d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })
      : relativeDayLabel(d);

    if(t.duration_minutes) text += ' · ' + formatDuration(t.duration_minutes);
    return `<span class="task-when ${cls}">${text}</span>`;
  }

  function priorityLabel(p){ return p === 'haute' ? 'Haute' : p === 'moyenne' ? 'Moyenne' : 'Basse'; }

  function render(){
    const vis = visibleTasks();
    listRoot.innerHTML = '';

    if(tasks.length === 0){
      listRoot.innerHTML = `<div class="empty">Rien pour l'instant. Respirez — puis ajoutez ce qui compte.</div>`;
    } else if(vis.length === 0){
      listRoot.innerHTML = `<div class="empty">Rien à montrer ici.</div>`;
    } else {
      const groups = groupByTime(vis);
      let runningIdx = 0;
      groups.forEach(group => {
        const divider = document.createElement('div');
        divider.className = 'group-divider';
        divider.textContent = group.label;
        listRoot.appendChild(divider);

        const ul = document.createElement('ul');
        ul.className = 'task-list';

        group.tasks.forEach((t) => {
          const li = document.createElement('li');
          li.className = 'task' + (t.done ? ' done' : '');
          li.setAttribute('data-id', t.id);
          li.setAttribute('data-priority', t.priority);
          li.style.animationDelay = (runningIdx * 28) + 'ms';
          runningIdx++;

          const catColor = t.category_color || '#8FA98F';

          li.innerHTML = `
            <div class="check" data-action="toggle"></div>
            <div class="task-body">
              <div class="task-text">${escapeHtml(t.text)}</div>
              <div class="task-tags">
                <span class="tag-priority ${t.priority}"><span class="pdot"></span>${priorityLabel(t.priority)}</span>
                <span class="tag-cat"><span class="dot" style="background:${catColor}"></span>${escapeHtml(t.category)}</span>
                ${taskWhenHtml(t)}
              </div>
            </div>
            <button class="remove-btn" data-action="remove" aria-label="Supprimer">×</button>
          `;
          ul.appendChild(li);
        });

        listRoot.appendChild(ul);
      });
    }

    listRoot.querySelectorAll('[data-action="toggle"]').forEach(el => {
      el.addEventListener('click', () => toggleTask(el.closest('.task').getAttribute('data-id')));
    });
    listRoot.querySelectorAll('[data-action="remove"]').forEach(el => {
      el.addEventListener('click', () => removeTask(el.closest('.task').getAttribute('data-id')));
    });

    updateRing();
    updateFooter();
  }

  function updateRing(){
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    ringCount.textContent = done;
    ringTotal.textContent = '/ ' + total;
    const ratio = total === 0 ? 0 : done / total;
    const offset = CIRCUMFERENCE * (1 - ratio);
    ringFg.style.strokeDasharray = CIRCUMFERENCE.toFixed(1);
    ringFg.style.strokeDashoffset = offset.toFixed(1);

    if(total === 0) subline.innerHTML = `Une tâche à la fois. <span id="time-display"></span>`;
    else if(done === total) subline.innerHTML = `Tout est fait. Profitez du calme. <span id="time-display"></span>`;
    else subline.innerHTML = `${done} sur ${total} accomplies. <span id="time-display"></span>`;
    tick();
  }

  function updateFooter(){
    const remaining = tasks.filter(t => !t.done).length;
    if(tasks.length === 0){ footerNote.textContent = ''; return; }
    footerNote.textContent = remaining === 0 ? 'aucune tâche en attente'
      : remaining + (remaining > 1 ? ' tâches restantes' : ' tâche restante');
  }

  function tick(){
    const now = new Date();
    const span = document.getElementById('time-display');
    if(span) span.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }

  // =========================================================
  // Events : composer
  // =========================================================
  addBtn.addEventListener('click', () => addTask(taskInput.value));
  taskInput.addEventListener('keydown', (e) => { if(e.key === 'Enter'){ e.preventDefault(); addTask(taskInput.value); } });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.getAttribute('data-filter');
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  // =========================================================
  // Init
  // =========================================================
  updatePriorityChip();
  updateCategoryChip();
  buildQuickOptions();
  buildTimeGrid();
  buildDurationChips();
  setInterval(tick, 1000 * 30);
})();
</script>

</body>
</html>
